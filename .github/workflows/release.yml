name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y build-essential git pkg-config cmake
            sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew update > /dev/null 2>&1 || true
            for pkg in cmake pkg-config git; do
              brew list --versions $pkg > /dev/null 2>&1 || brew install $pkg > /dev/null 2>&1 || true
            done
          fi

      - name: Install prerequisites (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --yes --no-progress | Out-Null
          choco install pkgconfiglite --yes --no-progress | Out-Null

      - name: Build and install raylib
        shell: bash
        run: |
          TEMP_PATH="${RUNNER_TEMP//\\//}"
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git raylib-src
          cmake -S raylib-src -B raylib-build \
            -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$TEMP_PATH/raylib-install"
          cmake --build raylib-build --config Release --parallel
          cmake --install raylib-build --prefix "$TEMP_PATH/raylib-install"

      - name: Configure and build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PKG_CONFIG_PATH="$RUNNER_TEMP/raylib-install/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/raylib-install"
          cmake --build build --config Release --parallel

      - name: Configure and build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          TEMP_PATH="${RUNNER_TEMP//\\//}"
          export PKG_CONFIG_PATH="$TEMP_PATH/raylib-install/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$TEMP_PATH/raylib-install"
          cmake --build build --config Release --parallel

      - name: Package (CPack)
        shell: bash
        run: |
          cd build
          # Use only ZIP on Windows (NSIS not available), DragNDrop on macOS, TGZ on Linux
          if [ "$RUNNER_OS" = "Windows" ]; then
            cpack -C Release -G ZIP
          else
            cpack -C Release
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: |
            build/*.dmg
            build/*.zip
            build/*.tar.gz
            build/*.tgz
          if-no-files-found: warn

  create_release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: package-macos-latest
          path: artifacts/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: package-ubuntu-latest
          path: artifacts/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: package-windows-latest
          path: artifacts/windows

      - name: List artifacts
        run: find artifacts -type f | sort || echo "No artifacts found"

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## raylib-map ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🍎 macOS | `.dmg` – drag `rMP.app` into Applications |
            | 🪟 Windows | `.zip` – extract and run `rMP.exe` |
            | 🐧 Linux | `.tar.gz` – extract and run `rMP` |

            > **macOS note:** If the app is blocked by Gatekeeper, open Terminal and run:
            > ```bash
            > sudo xattr -rd com.apple.quarantine /Applications/rMP.app
            > ```
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.tgz
          fail_on_unmatched_files: false
