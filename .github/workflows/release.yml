name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites & build raylib
        run: |
          set -e
          echo "Runner: $RUNNER_OS"
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y build-essential git pkg-config cmake wget
            sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew update || true
            brew install cmake pkg-config git || true
          else
            choco install -y git cmake || true
          fi

          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git raylib-src
          cmake -S raylib-src -B raylib-build -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build raylib-build --config Release --parallel
          cmake --install raylib-build --prefix "$RUNNER_TEMP/raylib-install"

      - name: Configure and build project (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/raylib-install" \
            -DPKG_CONFIG_EXECUTABLE=""
          cmake --build build --config Release --parallel

      - name: Configure and build project (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export PKG_CONFIG_PATH="$(cygpath -u "$RUNNER_TEMP")/raylib-install/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(cygpath -m "$RUNNER_TEMP")/raylib-install"
          cmake --build build --config Release --parallel

      - name: Package (CPack)
        run: |
          cd build
          cmake --build . --config Release --target package || cpack --config CPackConfig.cmake || true

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: |
            build/*.dmg
            build/*.zip
            build/*.tar.gz
            build/*.tgz
            build/*.AppImage
            build/*.exe
          if-no-files-found: ignore

  create_release:
    name: Create Release and upload assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: |
          find artifacts -type f -ls 2>/dev/null || echo "No artifacts found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}

            ## Packages
            - macOS: .dmg bundle
            - Windows: .zip with .exe
            - Linux: .tar.gz binary
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.tgz
            artifacts/**/*.exe
