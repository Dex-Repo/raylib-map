name: CI Build

on:
  push:
    branches: [main, master]
    paths:
      - '**.c'
      - '**.h'
      - 'CMakeLists.txt'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**.c'
      - '**.h'
      - 'CMakeLists.txt'
      - '.github/workflows/ci.yml'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git pkg-config cmake
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update > /dev/null 2>&1 || true
          for pkg in cmake pkg-config; do
            brew list --versions $pkg > /dev/null 2>&1 || brew install $pkg > /dev/null 2>&1 || true
          done

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' --yes --no-progress | Out-Null
          choco install pkgconfiglite --yes --no-progress | Out-Null

      - name: Build and install raylib
        shell: bash
        run: |
          TEMP_PATH="${RUNNER_TEMP//\\//}"
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git raylib-src
          cmake -S raylib-src -B raylib-build -DBUILD_EXAMPLES=OFF -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$TEMP_PATH/raylib-install"
          cmake --build raylib-build --config Release --parallel
          cmake --install raylib-build --prefix "$TEMP_PATH/raylib-install"

      - name: Configure project (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PKG_CONFIG_PATH="$RUNNER_TEMP/raylib-install/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/raylib-install"

      - name: Configure project (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          TEMP_PATH="${RUNNER_TEMP//\\//}"
          export PKG_CONFIG_PATH="$TEMP_PATH/raylib-install/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$TEMP_PATH/raylib-install"

      - name: Build project
        run: cmake --build build --config Release --parallel

      - name: Test executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ls -la build/bin/ || ls -la build/
          file build/bin/rMP* 2>/dev/null || file build/rMP* 2>/dev/null || true

      - name: Test executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem -Path build\bin -Recurse -ErrorAction SilentlyContinue
          Get-ChildItem -Path build -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -match 'rMP' }
